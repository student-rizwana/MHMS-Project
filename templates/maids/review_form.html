{% extends 'base.html' %}

{% block title %}Review {{ maid.name }} - MHMS{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4><i class="bi bi-star-fill"></i> Rate & Review {{ maid.name }}</h4>
                    <p class="mb-0">Booking: {{ booking.booking_date|date:"M d, Y" }} with {{ maid.name }}</p>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        {% load crispy_forms_tags %}
                        {% crispy form %}
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-fill">
                                <i class="bi bi-check-circle"></i> Submit Review
                            </button>
                            <a href="{% url 'maids:detail' maid.name %}" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-check-input:checked {
        background-color: #ffc107;
        border-color: #ffc107;
    }
</style>
{% endblock %}
