{% extends 'base.html' %}

{% block title %}Profile - MHMS{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4><i class="bi bi-person-circle"></i> My Profile</h4>
            </div>
            <div class="card-body">
                <p><strong>Username:</strong> {{ user.username }}</p>
                <p><strong>Email:</strong> {{ user.email }}</p>
                <p><strong>Phone:</strong> {{ profile.phone }}</p>
                <p><strong>Address:</strong> {{ profile.address|default:"Not set" }}</p>
                <a href="{% url 'users:profile_update' %}" class="btn btn-primary">Edit Profile</a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body text-center">
                <h5>Welcome back!</h5>
                <a href="{% url 'maids:public_list' %}" class="btn btn-outline-primary w-100">Find Maids</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
